    <text x="64" y="116" font-family="&#39;JetBrains Mono&#39;, ui-monospace, monospace" font-weight="500" font-size="11" letter-spacing="2.6" fill="#5b4f3a">SCAN <tspan fill="#b34a3a">→</tspan> OCR <tspan fill="#b34a3a">→</tspan> LLM <tspan fill="#b34a3a">→</tspan> LATEX</text>
