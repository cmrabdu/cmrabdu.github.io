<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 540" width="1260" height="540" role="img" aria-label="Palimpsest">
  <defs>
    <linearGradient id="H-paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4ebd6"/>
      <stop offset="1" stop-color="#e9dbb6"/>
    </linearGradient>
    <linearGradient id="H-mark-paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6eedd"/>
      <stop offset="1" stop-color="#e0cf9c"/>
    </linearGradient>
    <linearGradient id="H-term" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5c7bff"/>
      <stop offset="1" stop-color="#2b3e9e"/>
    </linearGradient>
    <pattern id="H-grain" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="rgba(120,90,40,0.022)"/>
      <line x1="0" y1="0" x2="3" y2="0" stroke="rgba(120,90,40,0.05)" stroke-width="0.3"/>
    </pattern>
  </defs>

  <!-- Full background — paper gradient + grain, seamless -->
  <rect x="0" y="0" width="1260" height="540" fill="url(#H-paper)"/>
  <rect x="0" y="0" width="1260" height="540" fill="url(#H-grain)"/>

  <!--
    Lockup centered in the canvas.
    Original logo.svg: viewBox 0 0 520 160. Visual content bbox approx x=26..475 y=4..128.
    Scale 1.7 → content 449×124 becomes 763×211.
    Centered in 1260×540:
      offset_x = (1260-763)/2 - 26*1.7 = 248.5 - 44.2 = 204
      offset_y = (540-211)/2 - 4*1.7  = 164.5 -  6.8 = 158
  -->
  <g transform="translate(195 129) scale(1.7)">

    <!-- Mark: paper card stack + terminal block -->
    <g transform="translate(30 36)">
      <!-- shadow / back page tilted -->
      <g transform="rotate(-4 44 44)">
        <rect x="6" y="4" width="64" height="80" rx="2" fill="#e7d8b3" stroke="#8a5a1f" stroke-width="1.4" opacity="0.75"/>
      </g>
      <!-- front paper page -->
      <rect x="0" y="0" width="64" height="82" rx="2" fill="url(#H-mark-paper)" stroke="#8a5a1f" stroke-width="1.6"/>
      <!-- red ledger margin -->
      <rect x="11" y="6" width="2.4" height="70" fill="#b34a3a"/>
      <!-- handwritten-style lines -->
      <g stroke="#5b4f3a" stroke-width="1" stroke-linecap="round" opacity="0.85">
        <line x1="20" y1="16" x2="54" y2="16"/>
        <line x1="20" y1="24" x2="50" y2="24"/>
        <line x1="20" y1="32" x2="55" y2="32"/>
        <line x1="20" y1="40" x2="48" y2="40"/>
        <line x1="20" y1="48" x2="54" y2="48"/>
      </g>
      <!-- dog-eared corner -->
      <path d="M 55 0 L 64 0 L 64 9 Z" fill="#d8c48d" stroke="#8a5a1f" stroke-width="1"/>
      <path d="M 55 0 L 64 9" stroke="#8a5a1f" stroke-width="1" fill="none"/>
      <!-- terminal block -->
      <g transform="translate(40 52)">
        <rect x="0" y="0" width="40" height="40" rx="2.5" fill="url(#H-term)" stroke="#0e1530" stroke-width="1.6"/>
        <rect x="-1.5" y="-1.5" width="43" height="43" rx="3.5" fill="none" stroke="#8aa6ff" stroke-width="0.8" opacity="0.55"/>
        <line x1="4" y1="6" x2="36" y2="6" stroke="#e3e7f5" stroke-width="0.6" opacity="0.55"/>
        <line x1="4" y1="34" x2="36" y2="34" stroke="#e3e7f5" stroke-width="0.6" opacity="0.55"/>
        <rect x="11" y="11" width="6" height="18" fill="#6fcf97"/>
      </g>
    </g>

    <!-- Wordmark -->
    <g transform="translate(160 0)">
      <text x="0" y="92" font-family="'JetBrains Mono', ui-monospace, monospace" font-weight="700" font-size="44" fill="#b34a3a">//</text>
      <text x="62" y="92" font-family="'JetBrains Mono', ui-monospace, monospace" font-weight="700" font-size="44" fill="#1a1812" letter-spacing="-0.5">Palimpsest</text>
      <text x="64" y="116" font-family="'JetBrains Mono', ui-monospace, monospace" font-weight="500" font-size="11" letter-spacing="2.6" fill="#5b4f3a">SCAN <tspan fill="#b34a3a">→</tspan> OCR <tspan fill="#b34a3a">→</tspan> LLM <tspan fill="#b34a3a">→</tspan> LATEX</text>
    </g>

  </g>
</svg>
