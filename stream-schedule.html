<script>
const timezones = [
  { name: "Europe/Brussels", label: "Brussels (UTC+1/+2)" },
  { name: "Europe/London", label: "London (UTC+0/+1)" },
  { name: "Europe/Paris", label: "Paris (UTC+1/+2)" },
  { name: "Europe/Berlin", label: "Berlin (UTC+1/+2)" },
  { name: "Europe/Amsterdam", label: "Amsterdam (UTC+1/+2)" },
  { name: "Europe/Madrid", label: "Madrid (UTC+1/+2)" },
  { name: "Europe/Rome", label: "Rome (UTC+1/+2)" },
  { name: "America/New_York", label: "New York (UTC-5/-4)" },
  { name: "America/Los_Angeles", label: "Los Angeles (UTC-8/-7)" },
  { name: "America/Chicago", label: "Chicago (UTC-6/-5)" },
  { name: "America/Toronto", label: "Toronto (UTC-5/-4)" },
  { name: "Asia/Tokyo", label: "Tokyo (UTC+9)" },
  { name: "Asia/Shanghai", label: "Shanghai (UTC+8)" },
  { name: "Asia/Singapore", label: "Singapore (UTC+8)" },
  { name: "Asia/Hong_Kong", label: "Hong Kong (UTC+8)" },
  { name: "Australia/Sydney", label: "Sydney (UTC+10/+11)" },
  { name: "UTC", label: "UTC (UTC+0)" }
];

let scheduleData = null;
let userTimezone = null;
let displayTimezone = null;

function getUserTimezone() {
  try { return Intl.DateTimeFormat().resolvedOptions().timeZone; } catch (e) { return "UTC"; }
}

function convertTime(timeStr, fromTz, toTz) {
  if (fromTz === toTz) return timeStr;
  const [hours, minutes] = timeStr.split(':').map(Number);
  const today = new Date();
  const refDate = new Date(today.getFullYear(), today.getMonth(), today.getDate(), hours, minutes, 0);
  const fmt = (tz) => new Intl.DateTimeFormat('en-US', {
    timeZone: tz, year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  }).formatToParts(refDate);
  const toDate = (parts) => new Date(
    parseInt(parts[4].value), parseInt(parts[0].value) - 1, parseInt(parts[2].value),
    parseInt(parts[6].value), parseInt(parts[8].value), 0
  );
  const offset1 = (refDate - toDate(fmt(fromTz))) / 60000;
  const offset2 = (refDate - toDate(fmt(toTz))) / 60000;
  const offsetDiff = offset1 - offset2;
  const newMinutes = refDate.getMinutes() + offsetDiff;
  const newHours = refDate.getHours() + Math.floor(newMinutes / 60);
  const finalHours = ((newHours % 24) + 24) % 24;
  const finalMinutes = ((newMinutes % 60) + 60) % 60;
  return `${String(finalHours).padStart(2, '0')}:${String(finalMinutes).padStart(2, '0')}`;
}

async function loadSchedule() {
  try {
    const response = await fetch('/schedule.json', { cache: 'no-store' });
    scheduleData = await response.json();
    userTimezone = getUserTimezone();
    displayTimezone = userTimezone;
    populateTimezoneSelect();
    updateScheduleDisplay();
  } catch (error) {
    console.error('Error loading schedule:', error);
    document.getElementById('schedule-grid').innerHTML =
      '<p style="grid-column: 1/-1; color: var(--muted);">Unable to load schedule. Please refresh.</p>';
  }
}

function populateTimezoneSelect() {
  const select = document.getElementById('timezone-select');
  while (select.options.length > 1) select.remove(1);
  timezones.forEach(tz => {
    const option = document.createElement('option');
    option.value = tz.name;
    option.textContent = tz.label;
    select.appendChild(option);
  });
  select.addEventListener('change', (e) => {
    displayTimezone = e.target.value === 'auto' ? userTimezone : e.target.value;
    updateScheduleDisplay();
  });
  updateTimezoneInfo();
}

function updateTimezoneInfo() {
  const tzInfo = timezones.find(t => t.name === displayTimezone);
  document.getElementById('current-timezone').textContent = `showing: ${tzInfo ? tzInfo.label : displayTimezone}`;
}

function updateScheduleDisplay() {
  if (!scheduleData) return;
  const grid = document.getElementById('schedule-grid');
  grid.innerHTML = '';
  updateTimezoneInfo();
  scheduleData.schedule.forEach(daySchedule => {
    const dayCard = document.createElement('div');
    dayCard.className = 'schedule-day-card';
    const dayHeader = document.createElement('div');
    dayHeader.className = 'schedule-day-header';
    dayHeader.textContent = daySchedule.day;
    dayCard.appendChild(dayHeader);
    const dayBody = document.createElement('div');
    dayBody.className = 'schedule-day-body';
    if (daySchedule.blocks.length === 0) {
      const off = document.createElement('div');
      off.className = 'schedule-block off-block';
      off.textContent = 'off';
      dayBody.appendChild(off);
    } else {
      daySchedule.blocks.forEach(block => {
        const el = document.createElement('div');
        el.className = `schedule-block ${block.type}-block`;
        if (block.type === 'off') {
          el.textContent = block.label;
        } else {
          const startTime = convertTime(block.startTime, scheduleData.baseTimezone, displayTimezone);
          const endTime = convertTime(block.endTime, scheduleData.baseTimezone, displayTimezone);
          el.innerHTML = `<div class="block-label">${block.label}</div><div class="block-time">${startTime} – ${endTime}</div>`;
        }
        dayBody.appendChild(el);
      });
    }
    dayCard.appendChild(dayBody);
    grid.appendChild(dayCard);
  });
}

document.addEventListener('DOMContentLoaded', loadSchedule);
</script>
